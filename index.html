<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>سيف والعريس — أتيليه بدل</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0A0A0A;color:#F0E6CC;font-family:'Cairo',sans-serif;direction:rtl;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#C9A84C55;border-radius:3px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-in{animation:fadeIn 0.4s ease forwards}
.gold-shimmer{background:linear-gradient(90deg,#C9A84C,#E8C97A,#A07830,#E8C97A,#C9A84C);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite}
input,textarea,select{background:#1A1A1A;border:1px solid #2A2A2A;color:#F0E6CC;font-family:'Cairo',sans-serif;border-radius:8px;padding:10px 14px;width:100%;font-size:14px;outline:none;transition:border-color 0.2s;direction:rtl}
input:focus,textarea:focus,select:focus{border-color:#C9A84C}
button{cursor:pointer;font-family:'Cairo',sans-serif}
select option{background:#1A1A1A;color:#F0E6CC}
.spinner{width:36px;height:36px;border:3px solid #2A2A2A;border-top-color:#C9A84C;border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
@media(max-width:768px){
  .sidebar{width:58px!important}
  .sidebar .label,.sidebar .logo-text,.sidebar .footer-text{display:none!important}
  .main-content{padding:14px!important}
  .grid-2{grid-template-columns:1fr!important}
  .stats-grid{grid-template-columns:1fr 1fr!important}
  .store-grid{grid-template-columns:1fr 1fr!important}
}
@media(max-width:480px){
  .store-grid{grid-template-columns:1fr!important}
  .stats-grid{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

// ── CONFIG ─────────────────────────────────────────────────
const API = '';  // same origin
const G={gold:"#C9A84C",goldLight:"#E8C97A",goldDark:"#A07830",black:"#0A0A0A",surface:"#111111",card:"#181818",border:"#2A2A2A",text:"#F0E6CC",muted:"#888"};
const today=new Date().toISOString().slice(0,10);

// ── API HELPERS ────────────────────────────────────────────
let TOKEN = localStorage.getItem('seif_token') || '';
const api = async (method, path, body) => {
  const res = await fetch(API + path, {
    method, headers: {'Content-Type':'application/json','x-token':TOKEN},
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
};

// ── COMPONENTS ─────────────────────────────────────────────
function GoldBtn({children,onClick,style,variant="primary",size="md",disabled}){
  const pad=size==="sm"?"6px 14px":size==="lg"?"16px 36px":"10px 20px";
  const fs=size==="sm"?13:size==="lg"?16:14;
  const vars={
    primary:{background:"linear-gradient(135deg,#C9A84C,#E8C97A,#A07830)",color:"#0A0A0A",border:"none"},
    ghost:{background:"transparent",border:"1px solid #C9A84C55",color:"#C9A84C"},
    danger:{background:"#3A1A1A",border:"1px solid #8B2020",color:"#FF6666"},
  };
  return <button disabled={disabled} onClick={onClick}
    style={{...vars[variant],borderRadius:8,fontWeight:700,fontFamily:"Cairo",cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,transition:"all 0.2s",display:"inline-flex",alignItems:"center",gap:6,padding:pad,fontSize:fs,...style}}
    onMouseEnter={e=>{if(!disabled)e.currentTarget.style.transform="translateY(-1px)"}}
    onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}
  >{children}</button>;
}

function Card({children,style}){return <div style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:16,padding:20,...style}}>{children}</div>;}
function Label({c}){return <label style={{fontSize:13,color:G.muted,display:"block",marginBottom:6}}>{c}</label>;}

function Badge({children,color="gold"}){
  const m={gold:{bg:"#C9A84C22",text:"#E8C97A",bd:"#C9A84C44"},green:{bg:"#1A3A1A",text:"#66BB66",bd:"#2A5A2A"},blue:{bg:"#1A1A3A",text:"#6666FF",bd:"#2A2A5A"},red:{bg:"#3A1A1A",text:"#FF6666",bd:"#5A2A2A"},gray:{bg:"#2A2A2A",text:"#888",bd:"#333"}};
  const c=m[color]||m.gold;
  return <span style={{background:c.bg,color:c.text,border:`1px solid ${c.bd}`,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{children}</span>;
}

function OBadge({s}){
  const m={جاري:"gold",جاهز:"green",تسليم:"blue",ملغي:"red",مؤكد:"green",انتظار:"gray"};
  return <Badge color={m[s]||"gray"}>{s}</Badge>;
}

function Spinner(){return <div className="spinner"/>;}

function Modal({title,children,onClose}){
  return <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"#000000DD",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div className="fade-in" style={{background:G.card,border:`1px solid ${G.border}`,borderRadius:20,padding:28,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{fontSize:18,fontWeight:700,color:G.gold}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",color:G.muted,fontSize:22,cursor:"pointer"}}>✕</button>
      </div>
      {children}
    </div>
  </div>;
}

function StatCard({icon,label,value,sub,color=G.gold}){
  return <Card style={{display:"flex",alignItems:"center",gap:14}}>
    <div style={{fontSize:26,background:`${color}22`,padding:12,borderRadius:12,flexShrink:0}}>{icon}</div>
    <div><div style={{fontSize:20,fontWeight:900,color}}>{value}</div>
      <div style={{fontSize:12,color:G.muted}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:G.goldDark,marginTop:2}}>{sub}</div>}
    </div>
  </Card>;
}

// ── PUBLIC STORE PAGE ──────────────────────────────────────
function StorePage({onAdminClick}){
  const [products,setProducts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState("الكل");
  const [selected,setSelected]=useState(null);
  const clickCount=useRef(0);
  const clickTimer=useRef(null);

  useEffect(()=>{
    fetch(API+'/api/products').then(r=>r.json()).then(d=>{setProducts(d);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const handleLogoClick=()=>{
    clickCount.current++;
    clearTimeout(clickTimer.current);
    if(clickCount.current>=2){clickCount.current=0;onAdminClick();}
    else{clickTimer.current=setTimeout(()=>{clickCount.current=0;},500);}
  };

  const cats=["الكل",...new Set(products.map(p=>p.category))];
  const filtered=products.filter(p=>filter==="الكل"||p.category===filter);

  return <div style={{minHeight:"100vh",background:G.black}}>
    {/* HERO */}
    <div style={{background:"linear-gradient(180deg,#1A1200 0%,#0A0A0A 100%)",borderBottom:`1px solid ${G.border}`,padding:"32px 24px",textAlign:"center",position:"relative"}}>
      <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 0%,#C9A84C15 0%,transparent 70%)"}}/>
      <div style={{position:"relative"}}>
        <div onClick={handleLogoClick} style={{fontSize:52,marginBottom:12,cursor:"pointer",userSelect:"none",display:"inline-block"}} title="🎩">🎩</div>
        <div className="gold-shimmer" style={{fontSize:36,fontWeight:900,fontFamily:"Amiri",marginBottom:6}}>سيف والعريس</div>
        <div style={{fontSize:14,color:G.muted,marginBottom:16}}>أتيليه بدل فاخرة — إدارة أبو سيف</div>
        <div style={{display:"flex",justifyContent:"center",gap:24,fontSize:13,color:G.goldDark}}>
          <span>📞 01009331804</span>
          <span>📞 01229723129</span>
        </div>
      </div>
    </div>

    {/* CATALOG */}
    <div style={{maxWidth:1100,margin:"0 auto",padding:"28px 20px"}}>
      <div style={{display:"flex",gap:8,marginBottom:24,flexWrap:"wrap",justifyContent:"center"}}>
        {cats.map(c=><button key={c} onClick={()=>setFilter(c)} style={{
          background:filter===c?G.gold:"transparent",color:filter===c?G.black:G.muted,
          border:`1px solid ${filter===c?G.gold:G.border}`,borderRadius:20,padding:"7px 18px",
          fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"Cairo",transition:"all 0.2s"
        }}>{c}</button>)}
      </div>

      {loading?<Spinner/>:
      <div className="store-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:20}}>
        {filtered.map(p=><div key={p.id} onClick={()=>setSelected(p)} className="fade-in" style={{
          background:G.card,border:`1px solid ${G.border}`,borderRadius:18,overflow:"hidden",
          cursor:"pointer",transition:"all 0.3s",
        }}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=G.gold;e.currentTarget.style.transform="translateY(-4px)";e.currentTarget.style.boxShadow=`0 12px 40px #C9A84C20`;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=G.border;e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
          <div style={{fontSize:64,textAlign:"center",background:"#141414",padding:"24px 0",borderBottom:`1px solid ${G.border}`}}>{p.image}</div>
          <div style={{padding:16}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{p.name}</div>
            <div style={{fontSize:12,color:G.muted,marginBottom:10}}>{p.description}</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
              {(p.sizes||[]).map(s=><span key={s} style={{background:"#222",borderRadius:4,padding:"2px 8px",fontSize:11}}>{s}</span>)}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:20,fontWeight:900,color:G.gold}}>{Number(p.price).toLocaleString()} ج</span>
              <span style={{fontSize:12,color:p.stock<=3?"#FF6666":"#66BB66"}}>{p.stock>0?`متوفر (${p.stock})`:"نفد"}</span>
            </div>
          </div>
        </div>)}
      </div>}
    </div>

    {/* PRODUCT MODAL */}
    {selected&&<Modal title={selected.name} onClose={()=>setSelected(null)}>
      <div style={{textAlign:"center",fontSize:80,marginBottom:16}}>{selected.image}</div>
      <div style={{fontSize:14,color:G.muted,marginBottom:16,textAlign:"center"}}>{selected.description}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16,justifyContent:"center"}}>
        {(selected.sizes||[]).map(s=><span key={s} style={{background:"#222",border:`1px solid ${G.border}`,borderRadius:6,padding:"4px 12px",fontSize:13}}>{s}</span>)}
      </div>
      <div style={{textAlign:"center",fontSize:28,fontWeight:900,color:G.gold,marginBottom:20}}>{Number(selected.price).toLocaleString()} جنيه</div>
      <div style={{background:"#141414",borderRadius:12,padding:16,textAlign:"center"}}>
        <div style={{fontSize:13,color:G.muted,marginBottom:8}}>للاستفسار والحجز تواصل معنا</div>
        <div style={{display:"flex",justifyContent:"center",gap:16,fontSize:14,fontWeight:700,color:G.gold}}>
          <span>📞 01009331804</span>
          <span>📞 01229723129</span>
        </div>
      </div>
    </Modal>}
  </div>;
}

// ── LOGIN MODAL ────────────────────────────────────────────
function LoginModal({onSuccess,onClose}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const submit=async()=>{
    setLoading(true);setErr('');
    try{
      const r=await fetch(API+'/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
      const d=await r.json();
      if(d.success){TOKEN=d.token;localStorage.setItem('seif_token',d.token);onSuccess();}
      else setErr('كلمة السر غلط!');
    }catch{setErr('حصل خطأ، حاول تاني');}
    setLoading(false);
  };

  return <div style={{position:"fixed",inset:0,background:"#000000EE",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div className="fade-in" style={{background:G.card,border:`1px solid ${G.gold}44`,borderRadius:20,padding:36,width:"100%",maxWidth:360,textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:12}}>🔐</div>
      <div style={{fontSize:18,fontWeight:700,color:G.gold,marginBottom:6}}>لوحة الإدارة</div>
      <div style={{fontSize:13,color:G.muted,marginBottom:24}}>أدخل كلمة السر للدخول</div>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&submit()}
        placeholder="كلمة السر..." style={{marginBottom:12,textAlign:"center",fontSize:16,letterSpacing:4}}/>
      {err&&<div style={{color:"#FF6666",fontSize:13,marginBottom:12}}>{err}</div>}
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <GoldBtn variant="ghost" onClick={onClose}>إلغاء</GoldBtn>
        <GoldBtn onClick={submit} disabled={loading}>{loading?"جاري...":"دخول"}</GoldBtn>
      </div>
    </div>
  </div>;
}

// ── ADMIN DASHBOARD ────────────────────────────────────────
function AdminDashboard({data,loading}){
  if(loading) return <Spinner/>;
  const rev=(data.orders||[]).reduce((s,o)=>s+Number(o.total),0);
  const pend=(data.orders||[]).filter(o=>o.status==="جاري").length;
  const low=(data.products||[]).filter(p=>p.stock<=3).length;
  const todayA=(data.appointments||[]).filter(a=>a.appt_date===today||a.appt_date?.slice(0,10)===today).length;
  return <div className="fade-in">
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20,color:G.gold}}>🏠 لوحة التحكم</h2>
    <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14,marginBottom:24}}>
      <StatCard icon="💰" label="إجمالي الإيرادات" value={`${rev.toLocaleString()} ج`} color={G.gold}/>
      <StatCard icon="📦" label="المنتجات" value={(data.products||[]).length} sub={low>0?`⚠️ ${low} مخزون منخفض`:"✅ المخزون كويس"} color="#66BB66"/>
      <StatCard icon="🛍️" label="الطلبات" value={(data.orders||[]).length} sub={`${pend} قيد التنفيذ`} color="#E8C97A"/>
      <StatCard icon="📅" label="مواعيد اليوم" value={todayA} color="#6699FF"/>
    </div>
    <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
      <Card>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:14,color:G.gold}}>آخر الطلبات</h3>
        {(data.orders||[]).slice(0,5).map(o=><div key={o.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${G.border}`}}>
          <div><div style={{fontSize:13,fontWeight:600}}>{o.customer}</div><div style={{fontSize:11,color:G.muted}}>{o.product}</div></div>
          <div style={{textAlign:"left"}}><div style={{fontSize:13,color:G.gold,fontWeight:700}}>{Number(o.total).toLocaleString()} ج</div><OBadge s={o.status}/></div>
        </div>)}
      </Card>
      <Card>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:14,color:G.gold}}>أقرب المواعيد</h3>
        {(data.appointments||[]).slice(0,5).map(a=><div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${G.border}`}}>
          <div><div style={{fontSize:13,fontWeight:600}}>{a.customer}</div><div style={{fontSize:11,color:G.muted}}>{a.type} — {a.appt_time}</div></div>
          <div style={{fontSize:11,color:G.goldLight}}>{a.appt_date?.slice(0,10)}</div>
        </div>)}
      </Card>
    </div>
  </div>;
}

// ── ADMIN PRODUCTS ─────────────────────────────────────────
function AdminProducts({data,reload}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("الكل");
  const [saving,setSaving]=useState(false);
  const products=data.products||[];
  const cats=["الكل",...new Set(products.map(p=>p.category))];
  const filtered=products.filter(p=>(filter==="الكل"||p.category===filter)&&p.name.includes(search));
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));

  const save=async()=>{
    if(!form.name||!form.price)return alert("اسم المنتج والسعر مطلوبين");
    setSaving(true);
    try{
      if(modal==="add") await api('POST','/api/products',{...form,price:+form.price,stock:+form.stock});
      else await api('PUT',`/api/products/${form.id}`,{...form,price:+form.price,stock:+form.stock});
      await reload();setModal(null);
    }catch(e){alert("خطأ: "+e.message);}
    setSaving(false);
  };

  const del=async id=>{
    if(!window.confirm("تأكيد حذف المنتج؟"))return;
    try{await api('DELETE',`/api/products/${id}`);await reload();}catch(e){alert(e.message);}
  };

  return <div className="fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <h2 style={{fontSize:20,fontWeight:800,color:G.gold}}>👔 المنتجات</h2>
      <GoldBtn onClick={()=>{setForm({name:"",category:"بدل رجالي",price:"",stock:"",description:"",image:"👔",sizes:["46","48","50","52","54"]});setModal("add");}}>+ إضافة منتج</GoldBtn>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
      <input placeholder="🔍 ابحث..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:170}}/>
      {cats.map(c=><button key={c} onClick={()=>setFilter(c)} style={{background:filter===c?G.gold:"transparent",color:filter===c?G.black:G.muted,border:`1px solid ${filter===c?G.gold:G.border}`,borderRadius:20,padding:"5px 14px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"Cairo"}}>{c}</button>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:14}}>
      {filtered.map(p=><Card key={p.id} style={{display:"flex",flexDirection:"column",gap:12,position:"relative"}}>
        {p.stock<=3&&<div style={{position:"absolute",top:10,left:10}}><Badge color="red">مخزون منخفض</Badge></div>}
        <div style={{fontSize:54,textAlign:"center",background:"#141414",borderRadius:12,padding:"14px 0"}}>{p.image}</div>
        <div>
          <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{p.name}</div>
          <div style={{fontSize:11,color:G.muted,marginBottom:6}}>{p.description}</div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>
            {(p.sizes||[]).map(s=><span key={s} style={{background:"#222",borderRadius:4,padding:"1px 6px",fontSize:10}}>{s}</span>)}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:15,fontWeight:800,color:G.gold}}>{Number(p.price).toLocaleString()} ج</span>
            <span style={{fontSize:12,color:p.stock<=3?"#FF6666":"#66BB66"}}>كمية: {p.stock}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <GoldBtn size="sm" onClick={()=>{setForm({...p,sizes:p.sizes||[]});setModal("edit");}} style={{flex:1}}>✏️ تعديل</GoldBtn>
          <GoldBtn size="sm" variant="danger" onClick={()=>del(p.id)}>🗑️</GoldBtn>
        </div>
      </Card>)}
    </div>
    {modal&&<Modal title={modal==="add"?"إضافة منتج":"تعديل المنتج"} onClose={()=>setModal(null)}>
      <div style={{display:"grid",gap:14}}>
        <div><Label c="اسم المنتج"/><input value={form.name||""} onChange={e=>F("name",e.target.value)} placeholder="اسم البدلة..."/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Label c="التصنيف"/><select value={form.category||""} onChange={e=>F("category",e.target.value)}><option>بدل رجالي</option><option>بدل عريس</option><option>سموكن</option><option>إكسسوارات</option></select></div>
          <div><Label c="الإيموجي"/><input value={form.image||"👔"} onChange={e=>F("image",e.target.value)} style={{textAlign:"center",fontSize:20}}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Label c="السعر (ج)"/><input type="number" value={form.price||""} onChange={e=>F("price",e.target.value)} placeholder="0"/></div>
          <div><Label c="الكمية"/><input type="number" value={form.stock||""} onChange={e=>F("stock",e.target.value)} placeholder="0"/></div>
        </div>
        <div><Label c="الوصف"/><textarea rows={2} value={form.description||""} onChange={e=>F("description",e.target.value)} placeholder="وصف المنتج..."/></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <GoldBtn variant="ghost" onClick={()=>setModal(null)}>إلغاء</GoldBtn>
          <GoldBtn onClick={save} disabled={saving}>{saving?"جاري الحفظ...":"💾 حفظ"}</GoldBtn>
        </div>
      </div>
    </Modal>}
  </div>;
}

// ── ADMIN ORDERS ───────────────────────────────────────────
function AdminOrders({data,reload}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [fs,setFs]=useState("الكل");
  const [saving,setSaving]=useState(false);
  const orders=data.orders||[];
  const products=data.products||[];
  const statuses=["الكل","جاري","جاهز","تسليم","ملغي"];
  const filtered=orders.filter(o=>fs==="الكل"||o.status===fs);
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const nextS={جاري:"جاهز",جاهز:"تسليم"};

  const save=async()=>{
    if(!form.customer||!form.product)return alert("اسم العميل والمنتج مطلوبين");
    setSaving(true);
    try{
      if(modal==="add") await api('POST','/api/orders',{...form,total:+form.total});
      else await api('PUT',`/api/orders/${form.id}`,{...form,total:+form.total});
      await reload();setModal(null);
    }catch(e){alert(e.message);}
    setSaving(false);
  };

  const del=async id=>{
    if(!window.confirm("حذف الطلب؟"))return;
    try{await api('DELETE',`/api/orders/${id}`);await reload();}catch(e){alert(e.message);}
  };

  const advance=async(o)=>{
    try{await api('PUT',`/api/orders/${o.id}`,{...o,status:nextS[o.status],total:Number(o.total)});await reload();}catch(e){alert(e.message);}
  };

  return <div className="fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <h2 style={{fontSize:20,fontWeight:800,color:G.gold}}>🛍️ طلبات العملاء</h2>
      <GoldBtn onClick={()=>{setForm({customer:"",phone:"",product:"",size:"50",status:"جاري",total:"",notes:"",order_date:today});setModal("add");}}>+ طلب جديد</GoldBtn>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
      {statuses.map(s=><button key={s} onClick={()=>setFs(s)} style={{background:fs===s?G.gold:"transparent",color:fs===s?G.black:G.muted,border:`1px solid ${fs===s?G.gold:G.border}`,borderRadius:20,padding:"5px 14px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"Cairo"}}>{s}</button>)}
    </div>
    <div style={{display:"grid",gap:12}}>
      {filtered.map(o=><Card key={o.id} style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:180}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:14}}>{o.customer}</span><OBadge s={o.status}/>
          </div>
          <div style={{fontSize:12,color:G.muted}}>📞 {o.phone}</div>
          <div style={{fontSize:12,marginTop:3}}>👔 {o.product} — مقاس {o.size}</div>
          {o.notes&&<div style={{fontSize:11,color:G.goldDark,marginTop:3}}>📝 {o.notes}</div>}
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:17,fontWeight:800,color:G.gold}}>{Number(o.total).toLocaleString()} ج</div>
          <div style={{fontSize:11,color:G.muted}}>{o.order_date?.slice(0,10)}</div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {nextS[o.status]&&<GoldBtn size="sm" variant="ghost" onClick={()=>advance(o)}>→ {nextS[o.status]}</GoldBtn>}
          <GoldBtn size="sm" onClick={()=>{setForm({...o,order_date:o.order_date?.slice(0,10)});setModal("edit");}}>✏️</GoldBtn>
          <GoldBtn size="sm" variant="danger" onClick={()=>del(o.id)}>🗑️</GoldBtn>
        </div>
      </Card>)}
    </div>
    {modal&&<Modal title={modal==="add"?"طلب جديد":"تعديل الطلب"} onClose={()=>setModal(null)}>
      <div style={{display:"grid",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Label c="اسم العميل"/><input value={form.customer||""} onChange={e=>F("customer",e.target.value)}/></div>
          <div><Label c="رقم الهاتف"/><input value={form.phone||""} onChange={e=>F("phone",e.target.value)} placeholder="010..."/></div>
        </div>
        <div><Label c="المنتج"/>
          <select value={form.product||""} onChange={e=>F("product",e.target.value)}>
            <option value="">اختر منتج</option>
            {products.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          <div><Label c="المقاس"/><input value={form.size||""} onChange={e=>F("size",e.target.value)} placeholder="50"/></div>
          <div><Label c="الإجمالي (ج)"/><input type="number" value={form.total||""} onChange={e=>F("total",e.target.value)}/></div>
          <div><Label c="الحالة"/><select value={form.status||"جاري"} onChange={e=>F("status",e.target.value)}><option>جاري</option><option>جاهز</option><option>تسليم</option><option>ملغي</option></select></div>
        </div>
        <div><Label c="ملاحظات"/><textarea rows={2} value={form.notes||""} onChange={e=>F("notes",e.target.value)}/></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <GoldBtn variant="ghost" onClick={()=>setModal(null)}>إلغاء</GoldBtn>
          <GoldBtn onClick={save} disabled={saving}>{saving?"جاري...":"💾 حفظ"}</GoldBtn>
        </div>
      </div>
    </Modal>}
  </div>;
}

// ── ADMIN APPOINTMENTS ─────────────────────────────────────
function AdminAppointments({data,reload}){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const appointments=data.appointments||[];
  const F=(k,v)=>setForm(f=>({...f,[k]:v}));
  const sorted=[...appointments].sort((a,b)=>a.appt_date?.localeCompare(b.appt_date));
  const grouped=sorted.reduce((acc,a)=>{const d=a.appt_date?.slice(0,10);(acc[d]=acc[d]||[]).push(a);return acc;},{});
  const typeIcon={قياس:"📏",تسليم:"📦",استفسار:"💬",تعديل:"✂️"};

  const save=async()=>{
    if(!form.customer||!form.appt_date)return alert("اسم العميل والتاريخ مطلوبين");
    setSaving(true);
    try{
      if(modal==="edit") await api('PUT',`/api/appointments/${form.id}`,form);
      else await api('POST','/api/appointments',form);
      await reload();setModal(null);
    }catch(e){alert(e.message);}
    setSaving(false);
  };

  const del=async id=>{
    if(!window.confirm("حذف الموعد؟"))return;
    try{await api('DELETE',`/api/appointments/${id}`);await reload();}catch(e){alert(e.message);}
  };

  return <div className="fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,flexWrap:"wrap",gap:10}}>
      <h2 style={{fontSize:20,fontWeight:800,color:G.gold}}>📅 المواعيد</h2>
      <GoldBtn onClick={()=>{setForm({customer:"",phone:"",appt_date:today,appt_time:"10:00",type:"قياس",notes:"",status:"مؤكد"});setModal("add");}}>+ موعد جديد</GoldBtn>
    </div>
    {Object.entries(grouped).map(([date,appts])=><div key={date} style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <div style={{height:1,flex:1,background:G.border}}/>
        <span style={{fontSize:12,fontWeight:700,color:date===today?G.gold:G.muted,padding:"3px 12px",background:date===today?"#C9A84C22":"#222",borderRadius:20,border:`1px solid ${date===today?G.gold:G.border}`}}>
          {date===today?"📍 اليوم — ":""}{date}
        </span>
        <div style={{height:1,flex:1,background:G.border}}/>
      </div>
      {appts.map(a=><Card key={a.id} style={{display:"flex",alignItems:"center",gap:14,marginBottom:10,flexWrap:"wrap"}}>
        <div style={{fontSize:26,background:"#1A1A1A",padding:"10px 12px",borderRadius:10}}>{typeIcon[a.type]||"📅"}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontWeight:700}}>{a.customer}</span><OBadge s={a.status}/><Badge color="gold">{a.type}</Badge>
          </div>
          <div style={{fontSize:12,color:G.muted}}>📞 {a.phone} • 🕐 {a.appt_time}</div>
          {a.notes&&<div style={{fontSize:11,color:G.goldDark,marginTop:3}}>📝 {a.notes}</div>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <GoldBtn size="sm" onClick={()=>{setForm({...a,appt_date:a.appt_date?.slice(0,10)});setModal("edit");}}>✏️</GoldBtn>
          <GoldBtn size="sm" variant="danger" onClick={()=>del(a.id)}>🗑️</GoldBtn>
        </div>
      </Card>)}
    </div>)}
    {modal&&<Modal title={modal==="edit"?"تعديل الموعد":"موعد جديد"} onClose={()=>setModal(null)}>
      <div style={{display:"grid",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Label c="اسم العميل"/><input value={form.customer||""} onChange={e=>F("customer",e.target.value)}/></div>
          <div><Label c="رقم الهاتف"/><input value={form.phone||""} onChange={e=>F("phone",e.target.value)} placeholder="010..."/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Label c="التاريخ"/><input type="date" value={form.appt_date||""} onChange={e=>F("appt_date",e.target.value)}/></div>
          <div><Label c="الوقت"/><input type="time" value={form.appt_time||""} onChange={e=>F("appt_time",e.target.value)}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><Label c="النوع"/><select value={form.type||"قياس"} onChange={e=>F("type",e.target.value)}><option>قياس</option><option>تسليم</option><option>استفسار</option><option>تعديل</option></select></div>
          <div><Label c="الحالة"/><select value={form.status||"مؤكد"} onChange={e=>F("status",e.target.value)}><option>مؤكد</option><option>انتظار</option><option>ملغي</option></select></div>
        </div>
        <div><Label c="ملاحظات"/><textarea rows={2} value={form.notes||""} onChange={e=>F("notes",e.target.value)}/></div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <GoldBtn variant="ghost" onClick={()=>setModal(null)}>إلغاء</GoldBtn>
          <GoldBtn onClick={save} disabled={saving}>{saving?"جاري...":"💾 حفظ"}</GoldBtn>
        </div>
      </div>
    </Modal>}
  </div>;
}

// ── ADMIN INVENTORY ────────────────────────────────────────
function AdminInventory({data,reload}){
  const products=data.products||[];
  const low=products.filter(p=>p.stock<=3);
  const totalVal=products.reduce((s,p)=>s+Number(p.price)*Number(p.stock),0);

  const upd=async(id,delta)=>{
    try{await api('PATCH',`/api/products/${id}/stock`,{delta});await reload();}catch(e){alert(e.message);}
  };

  return <div className="fade-in">
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20,color:G.gold}}>📦 إدارة المخزون</h2>
    <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14,marginBottom:22}}>
      <StatCard icon="💎" label="قيمة المخزون" value={`${totalVal.toLocaleString()} ج`}/>
      <StatCard icon="📊" label="إجمالي الأصناف" value={products.length}/>
      <StatCard icon="⚠️" label="مخزون منخفض" value={low.length} color="#FF6666"/>
      <StatCard icon="✅" label="مخزون كافي" value={products.filter(p=>p.stock>3).length} color="#66BB66"/>
    </div>
    {low.length>0&&<Card style={{marginBottom:16,border:"1px solid #5A2A2A",background:"#1A0A0A"}}>
      <div style={{fontSize:13,fontWeight:700,color:"#FF6666",marginBottom:8}}>⚠️ منتجات تحتاج إعادة تخزين</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{low.map(p=><Badge key={p.id} color="red">{p.name} ({p.stock})</Badge>)}</div>
    </Card>}
    <div style={{display:"grid",gap:12}}>
      {products.map(p=><Card key={p.id} style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
        <div style={{fontSize:30}}>{p.image}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,marginBottom:2}}>{p.name}</div>
          <div style={{fontSize:12,color:G.muted}}>{p.category} • {Number(p.price).toLocaleString()} ج</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>upd(p.id,-1)} style={{background:"#2A1A1A",border:"1px solid #5A2A2A",color:"#FF6666",borderRadius:6,width:32,height:32,fontSize:18,cursor:"pointer"}}>−</button>
          <span style={{fontSize:18,fontWeight:800,color:p.stock<=3?"#FF6666":G.gold,minWidth:34,textAlign:"center"}}>{p.stock}</span>
          <button onClick={()=>upd(p.id,+1)} style={{background:"#1A2A1A",border:"1px solid #2A5A2A",color:"#66BB66",borderRadius:6,width:32,height:32,fontSize:18,cursor:"pointer"}}>+</button>
          <span style={{fontSize:11,color:G.muted,minWidth:80}}>{(Number(p.price)*Number(p.stock)).toLocaleString()} ج</span>
        </div>
      </Card>)}
    </div>
  </div>;
}

// ── ADMIN SHELL ────────────────────────────────────────────
const PAGES=[
  {id:"dashboard",label:"الرئيسية",icon:"🏠"},
  {id:"products",label:"المنتجات",icon:"👔"},
  {id:"orders",label:"الطلبات",icon:"🛍️"},
  {id:"appointments",label:"المواعيد",icon:"📅"},
  {id:"inventory",label:"المخزون",icon:"📦"},
];

function AdminPanel({onLogout}){
  const [page,setPage]=useState("dashboard");
  const [data,setData]=useState({products:[],orders:[],appointments:[]});
  const [loading,setLoading]=useState(true);

  const reload=useCallback(async()=>{
    setLoading(true);
    try{
      const [products,orders,appointments]=await Promise.all([
        api('GET','/api/products'),
        api('GET','/api/orders'),
        api('GET','/api/appointments'),
      ]);
      setData({products,orders,appointments});
    }catch(e){
      if(e.message.includes("401")||e.message.includes("غير مصرح")){onLogout();}
    }
    setLoading(false);
  },[]);

  useEffect(()=>{reload();},[]);

  const pending=(data.orders||[]).filter(o=>o.status==="جاري").length;

  return <div style={{display:"flex",minHeight:"100vh",background:G.black}}>
    <aside className="sidebar" style={{width:220,background:G.surface,borderLeft:`1px solid ${G.border}`,display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",flexShrink:0,zIndex:100}}>
      <div style={{padding:"18px 14px",borderBottom:`1px solid ${G.border}`,textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:6}}>🎩</div>
        <div className="gold-shimmer logo-text" style={{fontSize:15,fontWeight:900,fontFamily:"Amiri"}}>سيف والعريس</div>
        <div className="label" style={{fontSize:10,color:G.muted,marginTop:2}}>لوحة الإدارة</div>
      </div>
      <nav style={{flex:1,padding:"10px 8px",display:"flex",flexDirection:"column",gap:3}}>
        {PAGES.map(p=><button key={p.id} onClick={()=>setPage(p.id)} style={{
          display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:10,border:"none",
          background:page===p.id?"#C9A84C22":"transparent",color:page===p.id?G.gold:G.muted,
          fontFamily:"Cairo",fontSize:14,fontWeight:page===p.id?700:400,cursor:"pointer",
          borderRight:page===p.id?`3px solid ${G.gold}`:"3px solid transparent",
          transition:"all 0.2s",width:"100%",textAlign:"right"
        }}>
          <span>{p.icon}</span><span className="label">{p.label}</span>
          {p.id==="orders"&&pending>0&&<span className="label" style={{marginRight:"auto",background:G.gold,color:G.black,borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:800}}>{pending}</span>}
        </button>)}
      </nav>
      <div style={{padding:12,borderTop:`1px solid ${G.border}`}}>
        <button onClick={onLogout} style={{background:"#2A1A1A",border:"1px solid #5A2A2A",color:"#FF6666",borderRadius:8,padding:"8px 0",width:"100%",fontSize:13,fontFamily:"Cairo",cursor:"pointer"}}>
          🚪 <span className="label">خروج</span>
        </button>
        <div className="footer-text" style={{fontSize:10,color:G.muted,textAlign:"center",marginTop:8}}>01009331804<br/>01229723129</div>
      </div>
    </aside>
    <main className="main-content" style={{flex:1,padding:24,overflowY:"auto"}}>
      {page==="dashboard"&&<AdminDashboard data={data} loading={loading}/>}
      {page==="products"&&<AdminProducts data={data} reload={reload}/>}
      {page==="orders"&&<AdminOrders data={data} reload={reload}/>}
      {page==="appointments"&&<AdminAppointments data={data} reload={reload}/>}
      {page==="inventory"&&<AdminInventory data={data} reload={reload}/>}
    </main>
  </div>;
}

// ── ROOT APP ───────────────────────────────────────────────
function App(){
  const [mode,setMode]=useState('store'); // store | login | admin
  
  // Auto-login if token exists
  useEffect(()=>{
    if(TOKEN){
      api('GET','/api/orders').then(()=>setMode('admin')).catch(()=>{TOKEN='';localStorage.removeItem('seif_token');});
    }
  },[]);

  const logout=()=>{TOKEN='';localStorage.removeItem('seif_token');setMode('store');};

  return <>
    {(mode==='store'||mode==='login')&&<StorePage onAdminClick={()=>setMode('login')}/>}
    {mode==='login'&&<LoginModal onSuccess={()=>setMode('admin')} onClose={()=>setMode('store')}/>}
    {mode==='admin'&&<AdminPanel onLogout={logout}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
